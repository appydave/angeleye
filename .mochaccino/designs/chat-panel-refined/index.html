<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AngelEye — Chat Panel Refined</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    background: #e8e0d4;
    color: #2a2018;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Mochaccino Banner */
  .mochaccino-banner {
    background: #2a2018;
    color: #7a6e5e;
    font-size: 11px;
    text-align: center;
    padding: 4px 0;
    letter-spacing: 0.08em;
    flex-shrink: 0;
  }

  /* App Layout */
  .app-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    max-width: 1440px;
    width: 100%;
    margin: 0 auto;
  }

  /* === LEFT SIDEBAR === */
  .sidebar {
    width: 150px;
    background: #1a1512;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .sidebar-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.12em;
    color: #c8841a;
    padding: 20px 16px 24px;
  }

  .sidebar-nav {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 0 8px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    font-size: 13px;
    font-weight: 500;
    color: #8a7d6e;
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
  }

  .nav-item:hover {
    background: rgba(200, 132, 26, 0.1);
    color: #b89a6a;
  }

  .nav-item.active {
    background: rgba(200, 132, 26, 0.15);
    color: #c8841a;
    font-weight: 600;
  }

  .nav-icon {
    font-size: 15px;
    width: 18px;
    text-align: center;
    opacity: 0.8;
  }

  /* === CONTENT WRAPPER (holds main-area + bottom-panel) === */
  .content-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* === MAIN AREA === */
  .main-area {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* === BOTTOM PANEL (Events — full width) === */
  .bottom-panel {
    display: none;
    flex-direction: column;
    height: 280px;
    border-top: 1px solid #d4cdc4;
    background: #ede7dc;
    flex-shrink: 0;
    overflow: hidden;
  }

  .bottom-panel.active {
    display: flex;
  }

  .bottom-panel-drag {
    height: 5px;
    background: #d4cdc4;
    cursor: ns-resize;
    flex-shrink: 0;
    position: relative;
  }

  .bottom-panel-drag::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 32px;
    height: 3px;
    background: #b0a494;
    border-radius: 2px;
  }

  .bottom-panel-header {
    display: flex;
    align-items: center;
    padding: 8px 16px;
    background: #f5f1eb;
    border-bottom: 1px solid #d4cdc4;
    gap: 12px;
    flex-shrink: 0;
  }

  .bottom-panel-title {
    font-size: 13px;
    font-weight: 700;
    color: #2a2018;
    letter-spacing: 0.04em;
  }

  .bottom-panel-session {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    color: #c8841a;
    letter-spacing: 0.06em;
  }

  .bottom-panel-close {
    margin-left: auto;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    cursor: pointer;
    color: #7a6e5e;
    font-size: 16px;
    transition: background 0.12s, color 0.12s;
  }

  .bottom-panel-close:hover {
    background: #ddd6cc;
    color: #2a2018;
  }

  .bottom-panel-events {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .bottom-panel-events::-webkit-scrollbar { width: 6px; }
  .bottom-panel-events::-webkit-scrollbar-track { background: transparent; }
  .bottom-panel-events::-webkit-scrollbar-thumb { background: #ccc5bb; border-radius: 3px; }

  /* === SESSION LIST (left half) === */
  .session-list-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid #d4cdc4;
    background: #e8e0d4;
  }

  .session-list-header {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    background: #ede7dc;
    border-bottom: 1px solid #d4cdc4;
    gap: 12px;
    flex-shrink: 0;
  }

  .session-list-title {
    font-size: 14px;
    font-weight: 700;
    color: #2a2018;
    letter-spacing: 0.04em;
  }

  .session-count-badge {
    font-size: 11px;
    font-weight: 600;
    background: #d4cdc4;
    color: #7a6e5e;
    padding: 1px 8px;
    border-radius: 8px;
  }

  .session-list-search {
    margin-left: auto;
    display: flex;
    align-items: center;
    background: #f5f1eb;
    border: 1px solid #d4cdc4;
    border-radius: 5px;
    padding: 4px 8px;
    gap: 5px;
  }

  .session-list-search svg { opacity: 0.35; }

  .search-placeholder {
    font-size: 12px;
    color: #b0a494;
  }

  /* Column header */
  .col-header {
    background: #2a2018;
    display: grid;
    grid-template-columns: 24px 1fr 80px 70px 60px;
    padding: 0 16px;
    height: 28px;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .col-header-cell {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #8a7d6e;
  }

  .col-header-cell.right { text-align: right; }

  /* Sessions list */
  .sessions-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .sessions-scroll::-webkit-scrollbar { width: 6px; }
  .sessions-scroll::-webkit-scrollbar-track { background: transparent; }
  .sessions-scroll::-webkit-scrollbar-thumb { background: #ccc5bb; border-radius: 3px; }

  /* Session row */
  .session-row {
    display: grid;
    grid-template-columns: 24px 1fr 80px 70px 60px;
    align-items: center;
    gap: 8px;
    padding: 7px 8px;
    background: #f5f1eb;
    border: 1px solid transparent;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.1s;
    font-size: 12px;
  }

  .session-row:hover {
    background: #ede7dc;
    border-color: #d4cdc4;
  }

  .session-row.selected {
    background: #ede7dc;
    border-color: #c8841a;
    box-shadow: 0 1px 4px rgba(200, 132, 26, 0.15);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    justify-self: center;
  }

  .status-dot.active { background: #27ae60; }
  .status-dot.recent { background: #c8841a; }
  .status-dot.idle { background: #b0a494; }

  .session-info {
    display: flex;
    flex-direction: column;
    gap: 1px;
    min-width: 0;
  }

  .session-project {
    font-size: 12px;
    font-weight: 600;
    color: #2a2018;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .session-name {
    font-size: 11px;
    color: #7a6e5e;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .session-name .rename-label {
    color: #c8841a;
    font-weight: 600;
  }

  .type-badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 3px;
    text-align: center;
    white-space: nowrap;
  }

  .type-badge.build { background: #2980b920; color: #2471a3; }
  .type-badge.knowledge { background: #8e44ad20; color: #7d3c98; }
  .type-badge.orientation { background: #c8841a20; color: #b07518; }

  .session-uuid {
    font-size: 10px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: #b0a494;
    text-align: right;
  }

  .session-time {
    font-size: 11px;
    color: #7a6e5e;
    text-align: right;
  }

  /* === CHAT PANEL (right half) === */
  .chat-panel {
    width: 50%;
    display: flex;
    flex-direction: column;
    background: #ede7dc;
    overflow: hidden;
    flex-shrink: 0;
  }

  /* Chat header */
  .chat-header {
    display: flex;
    align-items: center;
    padding: 12px 20px;
    background: #f5f1eb;
    border-bottom: 1px solid #d4cdc4;
    gap: 12px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .chat-header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
  }

  .chat-session-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: #c8841a;
    letter-spacing: 0.06em;
    line-height: 1;
  }

  .chat-project {
    font-size: 12px;
    color: #7a6e5e;
  }

  .chat-type-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 3px;
    background: #2980b920;
    color: #2471a3;
  }

  .chat-uuid {
    font-size: 10px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: #b0a494;
  }

  .chat-header-controls {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* Tab switcher */
  .panel-tabs {
    display: flex;
    gap: 0;
    margin-left: auto;
  }

  .panel-tab {
    font-size: 12px;
    font-weight: 600;
    color: #7a6e5e;
    padding: 4px 12px 6px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.12s, border-color 0.12s;
    user-select: none;
  }

  .panel-tab:hover {
    color: #4a3e30;
  }

  .panel-tab.active {
    color: #2a2018;
    border-bottom-color: #c8841a;
  }

  /* Tool toggle */
  .tool-toggle {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: #7a6e5e;
    cursor: pointer;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid #d4cdc4;
    background: #ede7dc;
    transition: all 0.12s;
    user-select: none;
  }

  .tool-toggle:hover {
    background: #ddd6cc;
    color: #4a3e30;
  }

  .tool-toggle.active {
    background: #e8e0d4;
    border-color: #c8841a;
    color: #c8841a;
  }

  .chat-close {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    cursor: pointer;
    color: #7a6e5e;
    font-size: 18px;
    transition: background 0.12s, color 0.12s;
  }

  .chat-close:hover {
    background: #ddd6cc;
    color: #2a2018;
  }

  /* Chat messages area */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .chat-messages::-webkit-scrollbar { width: 6px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: #ccc5bb; border-radius: 3px; }

  /* Message layout */
  .message-row {
    display: flex;
    gap: 10px;
    max-width: 92%;
  }

  .message-row.user {
    align-self: flex-end;
    flex-direction: row-reverse;
  }

  .message-row.claude {
    align-self: flex-start;
  }

  .message-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .message-avatar.user-avatar {
    background: #c8841a;
    color: #fff;
  }

  .message-avatar.claude-avatar {
    background: #2a2018;
    color: #d4c9b8;
  }

  .message-content {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .message-meta {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .message-row.user .message-meta {
    flex-direction: row-reverse;
  }

  .message-sender {
    font-size: 11px;
    font-weight: 700;
    color: #2a2018;
  }

  .message-time {
    font-size: 10px;
    color: #b0a494;
  }

  /* Tool badge on claude messages */
  .tool-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    color: #7a6e5e;
    background: #e8e0d4;
    border: 1px solid #d4cdc4;
    padding: 1px 6px;
    border-radius: 3px;
    cursor: default;
  }

  .tool-badge-icon {
    font-size: 9px;
  }

  /* User bubble */
  .bubble {
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.5;
    box-shadow: 0 1px 3px rgba(42, 32, 24, 0.06);
  }

  .bubble.user-bubble {
    background: #f5f1eb;
    border: 1px solid #d4cdc4;
    border-left: 3px solid #c8841a;
    border-radius: 10px 10px 4px 10px;
    color: #2a2018;
  }

  .bubble.claude-bubble {
    background: #e8e0d4;
    border: 1px solid #d4cdc4;
    border-radius: 10px 10px 10px 4px;
    color: #2a2018;
  }

  .bubble code {
    background: #ddd6cc;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 12px;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }

  .bubble p { margin-bottom: 8px; }
  .bubble p:last-child { margin-bottom: 0; }

  .bubble ul {
    margin: 6px 0;
    padding-left: 18px;
  }

  .bubble li {
    margin-bottom: 4px;
    line-height: 1.5;
  }

  .bubble strong {
    font-weight: 700;
  }

  /* Tool calls row */
  .tool-calls-row {
    padding: 0 0 0 38px;
  }

  .tool-calls-summary {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #7a6e5e;
    background: #e8e0d4;
    border: 1px solid #d4cdc4;
    border-radius: 4px;
    padding: 4px 10px;
    cursor: pointer;
    transition: background 0.12s;
  }

  .tool-calls-summary:hover {
    background: #ddd6cc;
    color: #4a3e30;
  }

  .tool-calls-arrow {
    font-size: 9px;
    transition: transform 0.15s;
  }

  .tool-calls-summary.expanded .tool-calls-arrow {
    transform: rotate(90deg);
  }

  .tool-calls-detail {
    margin-top: 6px;
    padding: 8px 12px;
    background: #f5f1eb;
    border: 1px solid #d4cdc4;
    border-radius: 4px;
    font-size: 11px;
    color: #7a6e5e;
    line-height: 1.7;
    display: none;
  }

  .tool-calls-detail.visible {
    display: block;
  }

  .tool-call-entry {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .tool-call-name {
    font-weight: 600;
    color: #4a3e30;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 11px;
  }

  .tool-call-path {
    color: #b0a494;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 10px;
  }

  /* === EVENTS VIEW === */
  .events-view {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: none;
    flex-direction: column;
    gap: 2px;
  }

  .events-view.active {
    display: flex;
  }

  .chat-messages.active {
    display: flex;
  }

  .chat-messages.hidden {
    display: none;
  }

  .event-row {
    display: grid;
    grid-template-columns: 52px auto 1fr;
    gap: 8px;
    padding: 5px 8px;
    border-radius: 4px;
    align-items: center;
    font-size: 12px;
    transition: background 0.1s;
  }

  .event-row:hover {
    background: #e8e0d4;
  }

  .event-time {
    font-size: 10px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: #b0a494;
  }

  .event-type {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 3px;
    text-align: center;
    white-space: nowrap;
  }

  .event-type.prompt { background: #c8841a18; color: #b07518; }
  .event-type.response { background: #2980b918; color: #2471a3; }
  .event-type.tool { background: #7a6e5e18; color: #5a4e3e; }
  .event-type.system { background: #8e44ad18; color: #7d3c98; }
  .event-type.error { background: #c0392b18; color: #a93226; }

  .event-summary {
    font-size: 12px;
    color: #4a3e30;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .event-summary code {
    background: #ddd6cc;
    padding: 1px 4px;
    border-radius: 3px;
    font-size: 11px;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }

  /* Tool group in events */
  .event-tool-group {
    margin: 2px 0;
  }

  .event-tool-group-header {
    display: grid;
    grid-template-columns: 52px auto 1fr auto;
    gap: 8px;
    padding: 5px 8px;
    border-radius: 4px;
    align-items: center;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.1s;
    user-select: none;
  }

  .event-tool-group-header:hover {
    background: #e8e0d4;
  }

  .tool-group-arrow {
    font-size: 9px;
    color: #7a6e5e;
    transition: transform 0.15s;
  }

  .tool-group-arrow.expanded {
    transform: rotate(90deg);
  }

  .event-tool-children {
    display: none;
    padding-left: 60px;
  }

  .event-tool-children.visible {
    display: block;
  }

  .event-tool-child {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 8px;
    font-size: 11px;
    color: #7a6e5e;
  }

  .event-tool-child-name {
    font-weight: 600;
    color: #4a3e30;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 11px;
  }

  .event-tool-child-path {
    color: #b0a494;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .event-tool-child-dur {
    font-size: 10px;
    color: #b0a494;
    margin-left: auto;
    white-space: nowrap;
  }

  /* Chat footer */
  .chat-footer {
    border-top: 1px solid #d4cdc4;
    background: #f5f1eb;
    flex-shrink: 0;
  }

  .chat-note {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-bottom: 1px solid #d4cdc4;
  }

  .note-input {
    flex: 1;
    font-size: 12px;
    color: #b0a494;
    font-style: italic;
  }

  .note-save-btn {
    font-size: 11px;
    font-weight: 600;
    color: #fff;
    background: #c8841a;
    border: none;
    border-radius: 4px;
    padding: 4px 12px;
    cursor: pointer;
    opacity: 0.5;
  }

  .chat-metadata {
    padding: 8px 20px;
    font-size: 11px;
    color: #7a6e5e;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .meta-sep {
    color: #d4cdc4;
  }
</style>
</head>
<body>

<!-- Mochaccino Banner -->
<div class="mochaccino-banner">Mochaccino &mdash; chat-panel-refined &mdash; 2026-03-24</div>

<div class="app-layout">

  <!-- LEFT SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo">ANGELEYE</div>
    <div class="sidebar-nav">
      <div class="nav-item active">
        <span class="nav-icon">&#9673;</span>
        Observer
      </div>
      <div class="nav-item">
        <span class="nav-icon">&#9776;</span>
        Organiser
      </div>
      <div class="nav-item">
        <span class="nav-icon">&#9881;</span>
        Settings
      </div>
    </div>
  </div>

  <!-- CONTENT WRAPPER -->
  <div class="content-wrapper">

  <!-- MAIN AREA -->
  <div class="main-area">

    <!-- SESSION LIST (left half) -->
    <div class="session-list-panel">
      <div class="session-list-header">
        <span class="session-list-title">Sessions</span>
        <span class="session-count-badge">42</span>
        <div class="session-list-search">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <span class="search-placeholder">Search...</span>
        </div>
      </div>

      <div class="col-header">
        <span class="col-header-cell"></span>
        <span class="col-header-cell">Session</span>
        <span class="col-header-cell">Type</span>
        <span class="col-header-cell right">UUID</span>
        <span class="col-header-cell right">Time</span>
      </div>

      <div class="sessions-scroll" id="sessions-scroll">
        <div style="color:#7a6e5e; padding:12px;">Loading...</div>
      </div>
    </div>

    <!-- CHAT PANEL (right half) -->
    <div class="chat-panel">

      <!-- Chat Header -->
      <div class="chat-header">
        <div class="chat-header-top">
          <span class="chat-session-name" id="chat-session-name">—</span>
          <span class="chat-project" id="chat-project">—</span>
          <span class="chat-type-badge" id="chat-type-badge">—</span>
          <span class="chat-uuid" id="chat-uuid">—</span>
          <div class="chat-header-controls">
            <div class="panel-tabs">
              <span class="panel-tab active" onclick="switchTab('chat')">Chat</span>
              <span class="panel-tab" onclick="switchTab('events')">Events</span>
            </div>
            <div class="tool-toggle" onclick="toggleToolVisibility(this)" title="Show/hide tool call rows between messages">&#9881; Tools</div>
            <span class="chat-close">&times;</span>
          </div>
        </div>
      </div>

      <!-- Chat Messages (default view) -->
      <div class="chat-messages active" id="chatView">
        <div style="color:#7a6e5e; padding:20px;">Loading messages...</div>
      </div>

      <!-- Chat Footer -->
      <div class="chat-footer">
        <div class="chat-note">
          <span class="note-input">Note: Add a note...</span>
          <button class="note-save-btn">Save</button>
        </div>
        <div class="chat-metadata" id="chat-metadata">—</div>
      </div>

    </div>

  </div>

  <!-- BOTTOM PANEL (Events — full width, pops up from bottom) -->
  <div class="bottom-panel" id="bottomPanel">
    <div class="bottom-panel-drag"></div>
    <div class="bottom-panel-header">
      <div class="panel-tabs">
        <span class="panel-tab" onclick="switchTab('chat')">Chat</span>
        <span class="panel-tab active" onclick="switchTab('events')">Events</span>
      </div>
      <span class="bottom-panel-session">BMAD-ADVISOR</span>
      <span style="font-size:12px;color:#7a6e5e;">app.supportsignal.com.au</span>
      <span class="bottom-panel-close" onclick="switchTab('chat')">&times;</span>
    </div>
    <div class="bottom-panel-events" id="bottom-panel-events">
      <div style="color:#7a6e5e; padding:12px;">Loading events...</div>
    </div>
  </div>

  </div><!-- /content-wrapper -->

</div>

<script>
  const API = '';

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  function dotClass(s) {
    if (s.status === 'active') return 'active';
    return 'idle';
  }

  function typeBadgeCls(t) {
    if (!t) return '';
    const lower = t.toLowerCase();
    if (lower === 'build') return 'build';
    if (lower === 'knowledge') return 'knowledge';
    if (lower === 'orientation') return 'orientation';
    return '';
  }

  function renderSessionRow(s, isFirst) {
    const nameHtml = s.userAssignedName
      ? `<span class="rename-label">${esc(s.userAssignedName)}</span>`
      : esc(s.sessionId);
    const badgeCls = typeBadgeCls(s.sessionType);
    const badgeHtml = s.sessionType
      ? `<span class="type-badge ${badgeCls}">${esc(s.sessionType)}</span>`
      : '';
    return `<div class="session-row${isFirst ? ' selected' : ''}" data-session-id="${esc(s.fullSessionId)}" onclick="selectSession(this)">
      <span class="status-dot ${dotClass(s)}"></span>
      <div class="session-info">
        <span class="session-project">${esc(s.projectSlug)}</span>
        <span class="session-name">${nameHtml}</span>
      </div>
      ${badgeHtml}
      <span class="session-uuid">${esc(s.sessionId)}</span>
      <span class="session-time">${esc(s.elapsedRelative)}</span>
    </div>`;
  }

  function renderMessage(m) {
    if (m.role === 'user') {
      return `<div class="message-row user">
        <div class="message-avatar user-avatar">You</div>
        <div class="message-content">
          <div class="message-meta">
            <span class="message-sender">You</span>
            <span class="message-time">${esc(m.timestamp)}</span>
          </div>
          <div class="bubble user-bubble">${esc(m.text)}</div>
        </div>
      </div>`;
    }
    return `<div class="message-row claude">
      <div class="message-avatar claude-avatar">C</div>
      <div class="message-content">
        <div class="message-meta">
          <span class="message-sender">Claude</span>
          <span class="message-time">${esc(m.timestamp)}</span>
        </div>
        <div class="bubble claude-bubble"><p>${esc(m.text)}</p></div>
      </div>
    </div>`;
  }

  function renderToolCall(tc) {
    return `<div class="event-row">
      <span class="event-time">${esc(tc.timestamp)}</span>
      <span class="event-type tool">TOOL</span>
      <span class="event-summary"><code>${esc(tc.tool)}</code> ${esc(tc.summary)}</span>
    </div>`;
  }

  function updateChatPanel(sel) {
    if (!sel) return;
    document.getElementById('chat-session-name').textContent =
      (sel.userAssignedName || sel.sessionId).toUpperCase();
    document.getElementById('chat-project').textContent = sel.projectSlug;
    document.getElementById('chat-type-badge').textContent = sel.sessionType || '—';
    document.getElementById('chat-uuid').textContent = sel.sessionId;

    const chatView = document.getElementById('chatView');
    if (sel.messages.length === 0) {
      chatView.innerHTML = '<div style="color:#7a6e5e; padding:20px; font-style:italic;">No conversation messages found for this session.</div>';
    } else {
      chatView.innerHTML = sel.messages.map(renderMessage).join('');
    }

    const metaEl = document.getElementById('chat-metadata');
    metaEl.innerHTML = `${sel.eventCount} events <span class="meta-sep">&bull;</span> ${sel.toolCalls.length} tool calls <span class="meta-sep">&bull;</span> ${esc(sel.sessionType || '—')} <span class="meta-sep">&bull;</span> ${sel.messages.filter(m => m.role === 'user').length} prompts`;

    const eventsEl = document.getElementById('bottom-panel-events');
    if (sel.toolCalls.length === 0) {
      eventsEl.innerHTML = '<div style="color:#7a6e5e; padding:12px; font-style:italic;">No tool calls recorded.</div>';
    } else {
      eventsEl.innerHTML = sel.toolCalls.map(renderToolCall).join('');
    }

    document.querySelector('.bottom-panel-session').textContent =
      (sel.userAssignedName || sel.sessionId).toUpperCase();
  }

  function selectSession(el) {
    document.querySelectorAll('.session-row').forEach(r => r.classList.remove('selected'));
    el.classList.add('selected');
    const sid = el.dataset.sessionId;
    if (sid) loadSession(sid);
  }

  async function loadSession(sid) {
    try {
      const res = await fetch(`${API}/api/mock-views/chat-panel?session=${sid}`);
      const json = await res.json();
      updateChatPanel(json.data.selectedSession);
    } catch (err) {
      document.getElementById('chatView').innerHTML =
        `<div style="color:red; padding:20px;">Failed: ${err.message}</div>`;
    }
  }

  async function load() {
    try {
      const res = await fetch(`${API}/api/mock-views/chat-panel`);
      const json = await res.json();
      const d = json.data;

      document.querySelector('.session-count-badge').textContent = d.totalCount;
      document.getElementById('sessions-scroll').innerHTML =
        d.sessions.map((s, i) => renderSessionRow(s, i === 0)).join('');

      updateChatPanel(d.selectedSession);
    } catch (err) {
      document.getElementById('sessions-scroll').innerHTML =
        `<div style="color:red; padding:12px;">Failed to load: ${err.message}</div>`;
    }
  }

  load();

// Tab switching — Chat = right panel, Events = bottom full-width panel
function switchTab(tab) {
  // Update ALL tab elements across both panels
  var allTabs = document.querySelectorAll('.panel-tab');
  allTabs.forEach(function(t) {
    var isChat = t.textContent.trim() === 'Chat';
    var isEvents = t.textContent.trim() === 'Events';
    if (tab === 'chat' && isChat) t.classList.add('active');
    else if (tab === 'events' && isEvents) t.classList.add('active');
    else t.classList.remove('active');
  });

  var chatPanel = document.querySelector('.chat-panel');
  var bottomPanel = document.getElementById('bottomPanel');
  var chatView = document.getElementById('chatView');

  if (tab === 'chat') {
    // Show right chat panel, hide bottom panel
    chatPanel.style.display = 'flex';
    chatView.classList.add('active');
    chatView.classList.remove('hidden');
    bottomPanel.classList.remove('active');
  } else {
    // Hide right chat panel, show bottom events panel (full width)
    chatPanel.style.display = 'none';
    chatView.classList.remove('active');
    chatView.classList.add('hidden');
    bottomPanel.classList.add('active');
  }
}

// Tool toggle
var toolsVisible = false;

function toggleToolVisibility(el) {
  toolsVisible = !toolsVisible;
  el.classList.toggle('active', toolsVisible);

  // Show/hide tool call rows
  var toolRows = document.querySelectorAll('.tool-row-collapsible');
  toolRows.forEach(function(row) {
    row.style.display = toolsVisible ? 'block' : 'none';
  });

  // Show/hide tool badges on Claude messages
  var badges = document.querySelectorAll('.tool-badge-collapsed');
  badges.forEach(function(badge) {
    badge.style.display = toolsVisible ? 'none' : 'inline-flex';
  });
}

// Tool detail expand/collapse (same as original)
function toggleTools(el) {
  el.classList.toggle('expanded');
  var detail = el.nextElementSibling;
  if (detail) detail.classList.toggle('visible');
  var arrow = el.querySelector('.tool-calls-arrow');
  if (el.classList.contains('expanded')) {
    arrow.style.transform = 'rotate(90deg)';
  } else {
    arrow.style.transform = '';
  }
}

// Event tool group expand/collapse
function toggleToolGroup(el) {
  var arrow = el.querySelector('.tool-group-arrow');
  var children = el.nextElementSibling;
  arrow.classList.toggle('expanded');
  if (children) children.classList.toggle('visible');
}
</script>

</body>
</html>
