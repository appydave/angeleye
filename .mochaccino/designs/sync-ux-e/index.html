<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sync UX E: Narrative Summary — Mochaccino</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #e8e0d4; --surface: #ede7dc; --surface-mid: #ddd6cc;
    --card: #f5f1eb; --border: #d4cdc4; --border-raised: #ccc5bb;
    --primary: #c8841a; --fg: #2a2018; --muted: #7a6e5e; --muted-dim: #9e9484;
    --green: #5a9a3c; --green-bg: #eef5ea;
  }
  body { background: var(--bg); color: var(--fg); font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.5; }
  .banner { background: var(--border); color: var(--muted); font-size: 11px; padding: 6px 16px; letter-spacing: 0.5px; }

  .shell { display: flex; height: calc(100vh - 28px); }
  .sidebar {
    width: 224px; flex-shrink: 0;
    border-right: 1px solid var(--border); background: var(--surface);
    padding: 16px 8px;
  }
  .sidebar .brand { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--primary); padding: 0 12px 16px; }
  .sidebar .nav-group-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted-dim); padding: 12px 12px 4px; }
  .sidebar .nav-item { display: block; width: 100%; text-align: left; padding: 8px 12px; border-radius: 4px; font-size: 13px; color: var(--fg); background: none; border: none; cursor: pointer; border-left: 2px solid transparent; }
  .sidebar .nav-item.active { border-left-color: var(--primary); font-weight: 600; background: var(--surface-mid); }
  .sidebar .nav-item:hover:not(.active) { background: var(--surface-mid); }

  .main { flex: 1; overflow-y: auto; background: var(--bg); padding: 24px; }
  .settings-header { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--fg); margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }

  .sync-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; max-width: 560px; }
  .sync-card h2 { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1.5px; color: var(--primary); margin-bottom: 4px; }
  .sync-card .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
  .sync-btn { padding: 6px 16px; font-size: 13px; font-weight: 500; border: 1px solid var(--border); border-radius: 4px; background: none; color: var(--fg); cursor: pointer; }
  .sync-btn:hover { border-color: var(--primary); color: var(--primary); }

  /* ── Concept E: Narrative prose summary ── */
  .narrative-result {
    margin-top: 16px; padding: 16px; border-radius: 6px;
    background: var(--green-bg); border-left: 3px solid var(--green);
  }
  .narrative-headline { font-size: 14px; font-weight: 600; color: var(--fg); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .narrative-headline .icon { color: var(--green); font-size: 16px; }

  .narrative-body { font-size: 13px; color: var(--fg); line-height: 1.7; }
  .narrative-body strong { font-weight: 600; }
  .narrative-body .accent { color: var(--primary); font-weight: 600; }
  .narrative-body .dim { color: var(--muted); }

  .narrative-projects { margin-top: 12px; padding-top: 10px; border-top: 1px solid rgba(90,154,60,0.2); }
  .narrative-projects p { font-size: 12px; color: var(--fg); line-height: 1.8; }

  .narrative-footer { margin-top: 10px; font-size: 11px; color: var(--muted); }

  /* ── "Nothing changed" variant ── */
  .narrative-empty {
    margin-top: 16px; padding: 12px 16px; border-radius: 6px;
    background: var(--surface); border-left: 3px solid var(--border);
  }
  .narrative-empty p { font-size: 13px; color: var(--muted); }

  /* ── Separator ── */
  .variant-label { margin-top: 32px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted-dim); margin-bottom: 8px; padding-top: 16px; border-top: 1px dashed var(--border); }
</style>
</head>
<body>
<div class="banner">MOCHACCINO MOCKUP — Sync UX Option E: Narrative Summary</div>
<div class="shell">
  <div class="sidebar">
    <div class="brand">ANGELEYE</div>
    <div class="nav-group-label">Views</div>
    <button class="nav-item">Observer</button>
    <button class="nav-item">Organiser</button>
    <button class="nav-item active">Settings</button>
    <button class="nav-item">Mockups</button>
  </div>
  <div class="main">
    <div class="settings-header">Settings</div>

    <div class="sync-card" id="sync-card">
      <h2>Session Sync</h2>
      <p class="subtitle">Scan and classify all Claude Code sessions in one pass.</p>
      <button class="sync-btn">Sync Sessions</button>
      <div id="sync-result" style="color:var(--muted); padding:12px 0;">Loading...</div>
    </div>
  </div>
</div>

<script>
  const API = '';

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  async function load() {
    try {
      const res = await fetch(`${API}/api/mock-views/sync`);
      const json = await res.json();
      const d = json.data;

      const topProjects = d.projectBreakdown.slice(0, 5).map(p =>
        `<strong>${esc(p.projectSlug)}</strong> — ${p.sessionCount} ${esc(p.dominantType || 'unclassified')} sessions`
      ).join('<br>');

      let html = '';

      if (d.unclassified > 0) {
        html += `<div class="narrative-result">
          <div class="narrative-headline"><span class="icon">&#10003;</span> Sync complete</div>
          <div class="narrative-body">
            Registry contains <span class="accent">${d.totalSessions} sessions</span> across <strong>${d.totalProjects}</strong> projects.
            <span class="dim">${d.classified} classified</span>, <span class="dim">${d.unclassified} unclassified</span>.
            <div class="narrative-projects"><p>${topProjects}</p></div>
          </div>
          <div class="narrative-footer">${d.totalSessions} total sessions across ${d.totalProjects} projects</div>
        </div>`;
      } else {
        html += `<div class="narrative-result">
          <div class="narrative-headline"><span class="icon">&#10003;</span> Sync complete</div>
          <div class="narrative-body">
            All <span class="accent">${d.totalSessions} sessions</span> classified across <strong>${d.totalProjects}</strong> projects.
            <div class="narrative-projects"><p>${topProjects}</p></div>
          </div>
          <div class="narrative-footer">${d.totalSessions} total sessions across ${d.totalProjects} projects</div>
        </div>`;
      }

      if (d.lastSync) {
        html += `<div style="margin-top:12px; font-size:12px; color:var(--muted);">
          Last sync: ${esc(String(d.lastSync.timestamp))} — imported ${d.lastSync.imported}, classified ${d.lastSync.classified}
        </div>`;
      }

      document.getElementById('sync-result').innerHTML = html;
    } catch (err) {
      document.getElementById('sync-result').innerHTML =
        `<div style="color:red;">Failed to load: ${err.message}</div>`;
    }
  }

  load();
</script>
</body>
</html>
