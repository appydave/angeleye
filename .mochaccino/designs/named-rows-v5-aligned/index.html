<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Named Rows v5: Aligned — Mochaccino</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #e8e0d4; --surface: #ede7dc; --surface-mid: #ddd6cc;
    --card: #f5f1eb; --border: #d4cdc4; --border-raised: #ccc5bb;
    --primary: #c8841a; --fg: #2a2018; --muted: #7a6e5e; --muted-dim: #9e9484;
    --amber: #c8841a;
  }
  body { background: var(--bg); color: var(--fg); font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.5; }
  .banner { background: var(--border); color: var(--muted); font-size: 11px; padding: 6px 16px; letter-spacing: 0.5px; }

  /* ── App shell (mimics real Observer) ─────────── */
  .shell { display: flex; height: calc(100vh - 28px); }

  .sidebar {
    width: 224px; flex-shrink: 0;
    border-right: 1px solid var(--border); background: var(--surface);
    padding: 16px 8px;
  }
  .sidebar .brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 2px; color: var(--primary);
    padding: 0 12px 16px;
  }
  .sidebar .nav-group-label {
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--muted-dim);
    padding: 12px 12px 4px;
  }
  .sidebar .nav-item {
    display: block; width: 100%; text-align: left;
    padding: 8px 12px; border-radius: 4px; font-size: 13px;
    color: var(--fg); background: none; border: none; cursor: pointer;
    border-left: 2px solid transparent;
  }
  .sidebar .nav-item.active {
    border-left-color: var(--primary); font-weight: 600; background: var(--surface-mid);
  }
  .sidebar .nav-item:hover:not(.active) { background: var(--surface-mid); }

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

  /* ── Header bar ──────────────────────────────── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 8px;
  }
  .header h1 { font-size: 22px; font-weight: 600; }
  .header .session-count { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .header .session-count .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #5a9a3c; }

  /* ── Filter bar ──────────────────────────────── */
  .filter-bar {
    display: flex; align-items: center; gap: 16px;
    padding: 4px 20px 8px; font-size: 12px;
  }
  .filter-bar .col-labels {
    flex: 1; display: grid;
    grid-template-columns: 24px 1fr 100px 72px 48px 48px 24px;
    gap: 8px; align-items: center;
    font-size: 10px; font-weight: 700; font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 1px; text-transform: uppercase; color: var(--muted-dim);
    padding: 0 12px;
  }
  .filter-bar .col-labels .r { text-align: right; }
  .filter-tabs { display: flex; gap: 2px; }
  .filter-tab {
    font-size: 11px; font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.8px; padding: 3px 10px; border-radius: 4px;
    border: none; cursor: pointer; background: transparent; color: var(--muted);
  }
  .filter-tab.active { background: var(--primary); color: #fff; }
  .filter-tab:hover:not(.active) { background: var(--surface-mid); }

  .toggles { display: flex; gap: 12px; font-size: 11px; color: var(--muted); }
  .toggles label { cursor: pointer; display: flex; align-items: center; gap: 4px; }

  /* ── Session list ────────────────────────────── */
  .session-list {
    flex: 1; overflow-y: auto; padding: 0 20px 20px;
    display: flex; flex-direction: column; gap: 6px;
  }

  /* ── Row — grid-based, matches Observer card style ── */
  .row {
    display: grid;
    grid-template-columns: 24px 1fr 100px 72px 48px 48px 24px;
    align-items: center;
    gap: 8px;
    padding: 0 12px;
    min-height: 56px;
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid transparent;
    border-radius: 6px;
    cursor: pointer;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    transition: all 0.15s;
  }
  .row:hover { box-shadow: 0 2px 6px rgba(0,0,0,0.08); background: #faf8f4; }

  /* Named row: amber left border */
  .row.named { border-left-color: var(--amber); }

  /* Focused row */
  .row.focused { border-left-color: var(--primary); background: var(--surface-mid); }

  /* ── Col 1: Status dot ───────────────────────── */
  .dot { font-size: 12px; text-align: center; }
  .dot.active { color: #5a9a3c; }
  .dot.recent { color: var(--amber); }
  .dot.idle { color: var(--muted-dim); }

  /* ── Col 2: Session cell (two lines) ─────────── */
  .session-cell {
    min-width: 0; padding: 8px 0;
    display: flex; flex-direction: column; gap: 2px;
  }
  .session-top {
    display: flex; align-items: baseline; gap: 6px;
    white-space: nowrap; overflow: hidden;
  }
  .label {
    font-size: 13px; font-weight: 500; color: var(--fg);
    overflow: hidden; text-overflow: ellipsis;
    cursor: pointer; max-width: 180px; flex-shrink: 0;
  }
  .label:hover { text-decoration: underline; }

  /* Named: bolder, wider */
  .row.named .label { font-weight: 600; max-width: none; flex-shrink: 1; }

  .ctx { font-size: 11px; color: var(--muted-dim); flex-shrink: 0; }

  .sid {
    font-size: 10px; font-family: 'SF Mono', 'Menlo', monospace;
    color: var(--muted-dim); opacity: 0.5; flex-shrink: 0;
  }

  .prompt {
    font-size: 12px; color: var(--muted); font-style: italic;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ── Col 3: Type badge — FIXED COLUMN ────────── */
  .type-cell { justify-self: start; }
  .badge {
    font-size: 10px; font-weight: 700; letter-spacing: 0.3px;
    font-family: system-ui, -apple-system, sans-serif;
    padding: 2px 8px; border-radius: 3px; text-transform: uppercase;
    display: inline-block; white-space: nowrap; color: #fff;
  }
  .badge.build { background: #5a9a3c; }
  .badge.orientation { background: #8b7355; }
  .badge.knowledge { background: #2a6e8a; }
  .badge.research { background: #7a5ca8; }
  .badge.ops { background: #e67e22; }
  .badge.test { background: #c0392b; }

  /* ── Col 4: When ─────────────────────────────── */
  .when { font-size: 12px; color: var(--muted); text-align: right; white-space: nowrap; }

  /* ── Col 5: Pulse ────────────────────────────── */
  .pulse {
    font-size: 11px; font-weight: 600;
    font-family: 'SF Mono', 'Menlo', monospace;
    text-align: right;
  }
  .pulse.green { color: #5a9a3c; }
  .pulse.amber { color: var(--amber); }
  .pulse.red { color: #c0392b; }
  .pulse.none { color: var(--muted-dim); }

  /* ── Col 6: Star ─────────────────────────────── */
  .star { font-size: 13px; cursor: pointer; text-align: center; }
  .star.empty { color: var(--muted-dim); opacity: 0.4; }
  .star.filled { color: var(--amber); }

  /* ── Col 7: Menu ─────────────────────────────── */
  .menu-dots { color: var(--muted-dim); cursor: pointer; text-align: center; font-size: 14px; }

  /* ── Focus panel stub ────────────────────────── */
  .focus-panel {
    border-top: 1px solid var(--border);
    background: var(--surface);
    padding: 12px 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .focus-panel .focus-name { font-size: 15px; font-weight: 600; color: var(--primary); }
  .focus-panel .focus-close { cursor: pointer; color: var(--muted); font-size: 16px; }
  .focus-panel .focus-meta { font-size: 12px; color: var(--muted); }

  /* ── Notes ────────────────────────────────────── */
  .notes-overlay {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card); border-top: 2px solid var(--border);
    padding: 16px 24px; max-height: 240px; overflow-y: auto;
    font-size: 13px; color: var(--muted); line-height: 1.6;
    z-index: 10;
  }
  .notes-overlay h2 { font-size: 14px; font-weight: 600; color: var(--fg); margin-bottom: 8px; }
  .notes-overlay ul { list-style: none; padding: 0; }
  .notes-overlay li { padding: 2px 0 2px 16px; position: relative; }
  .notes-overlay li::before { content: '—'; position: absolute; left: 0; color: var(--border-raised); }
  .notes-overlay li strong { color: var(--fg); }
  .notes-toggle {
    position: fixed; bottom: 8px; right: 24px; z-index: 11;
    font-size: 11px; padding: 4px 12px; border-radius: 4px;
    background: var(--fg); color: var(--card); border: none; cursor: pointer;
    font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="banner">Mochaccino — named-rows-v5-aligned — API-driven</div>

<div class="shell">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="brand">ANGELEYE</div>
    <div class="nav-group-label">Main</div>
    <button class="nav-item active">Observer</button>
    <button class="nav-item">Organiser</button>
    <div class="nav-group-label">System</div>
    <button class="nav-item">Settings</button>
    <button class="nav-item">Mockups</button>
  </div>

  <div class="main">
    <!-- Header -->
    <div class="header">
      <h1>Observer</h1>
      <div class="session-count" id="session-count">— sessions <span class="live-dot"></span></div>
    </div>

    <!-- Filter + column headers -->
    <div class="filter-bar">
      <div class="col-labels">
        <span></span>
        <span>Session</span>
        <span>Type</span>
        <span class="r">When</span>
        <span class="r">Pulse</span>
        <span></span>
        <span></span>
      </div>
    </div>
    <div style="display: flex; align-items: center; gap: 8px; padding: 0 20px 8px 32px;">
      <div class="filter-tabs">
        <button class="filter-tab active">All</button>
        <button class="filter-tab">Starred</button>
        <button class="filter-tab">Named</button>
      </div>
      <div class="toggles">
        <label><input type="checkbox" checked disabled> show junk</label>
      </div>
    </div>

    <!-- Session list -->
    <div class="session-list" id="session-list">
      <div style="color:var(--muted); padding:20px;">Loading...</div>
    </div>

    <!-- Focus panel stub -->
    <div class="focus-panel" id="focus-panel" style="display:none">
      <span class="focus-name" id="focus-name"></span>
      <span class="focus-meta" id="focus-meta"></span>
      <span class="focus-close" onclick="document.getElementById('focus-panel').style.display='none'">✕</span>
    </div>
  </div>
</div>

<script>
  const API = '';

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  function dotClass(s) {
    if (s.status === 'active' && s.pulseMinutes !== null && s.pulseMinutes < 5) return 'active';
    if (s.status === 'active') return 'recent';
    return 'idle';
  }

  function dotChar(s) { return s.status === 'active' ? '●' : '○'; }

  function pulseHtml(s) {
    if (s.pulseMinutes === null) return '<span class="pulse none">—</span>';
    const cls = s.pulseMinutes < 10 ? 'green' : s.pulseMinutes < 60 ? 'amber' : 'red';
    return `<span class="pulse ${cls}">${s.pulseMinutes}m</span>`;
  }

  function badgeHtml(type) {
    if (!type) return '<div class="type-cell"></div>';
    const cls = type.toLowerCase();
    return `<div class="type-cell"><span class="badge ${cls}">${esc(type)}</span></div>`;
  }

  function renderRow(s) {
    const named = s.isNamed;
    const rowClass = named ? 'row named' : 'row';
    const nameHtml = named
      ? `<span class="label">${esc(s.userAssignedName)}</span>
         <span class="ctx">${esc(s.projectSlug)}</span>`
      : `<span class="label">${esc(s.projectSlug)}</span>`;

    return `<div class="${rowClass}">
      <span class="dot ${dotClass(s)}">${dotChar(s)}</span>
      <div class="session-cell">
        <div class="session-top">
          ${nameHtml}
          <span class="sid">${esc(s.sessionId)}</span>
        </div>
        <div class="prompt">${esc(s.lastPromptSnippet)}</div>
      </div>
      ${badgeHtml(s.sessionType)}
      <span class="when">${esc(s.whenRelative)}</span>
      ${pulseHtml(s)}
      <span class="star ${s.isStarred ? 'filled' : 'empty'}">${s.isStarred ? '★' : '☆'}</span>
      <span class="menu-dots">—</span>
    </div>`;
  }

  async function load() {
    try {
      const res = await fetch(`${API}/api/mock-views/named-rows`);
      const json = await res.json();
      const d = json.data;

      document.getElementById('session-count').innerHTML =
        `${d.totalCount} sessions <span class="live-dot"></span>`;
      document.getElementById('session-list').innerHTML = d.sessions.map(renderRow).join('');
    } catch (err) {
      document.getElementById('session-list').innerHTML =
        `<div style="color:red; padding:20px;">Failed to load: ${err.message}</div>`;
    }
  }

  load();
</script>

</body>
</html>
