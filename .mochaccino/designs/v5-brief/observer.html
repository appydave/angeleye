<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AngelEye — Observer — v5-brief</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --canvas:       #f5f1eb;
      --header-bg:    #ffffff;
      --header-border:#e8e0d6;
      --sidebar-bg:   #f0ebe2;
      --sidebar-active-bg: #faf7f2;
      --sidebar-active-border: #c8841a;
      --text-primary: #1a1410;
      --text-muted:   #9a8a78;
      --text-sidebar: #2a2018;
      --text-sidebar-muted: #8a7a68;
      --border:       #e8e0d6;
      --amber:        #c8841a;
      --amber-light:  #fef3e2;
      --amber-border: #f0c070;
      --mono: ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
      --sans: system-ui, -apple-system, 'Segoe UI', sans-serif;
    }

    html, body {
      height: 100%;
      font-family: var(--sans);
      background: var(--canvas);
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.4;
    }

    /* ── Layout ── */
    .shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--header-bg);
      border-bottom: 1px solid var(--header-border);
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
      z-index: 10;
    }

    .header-wordmark {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .pill-active {
      background: var(--amber-light);
      color: var(--amber);
      border: 1px solid var(--amber-border);
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 100px;
      letter-spacing: 0.01em;
    }

    .header-total {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    /* ── Body row ── */
    .body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 200px;
      flex-shrink: 0;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      padding: 20px 0;
      overflow-y: auto;
    }

    .sidebar-group-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-sidebar-muted);
      padding: 0 16px 8px 16px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      font-size: 13px;
      color: var(--text-sidebar);
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.1s;
    }

    .sidebar-item:hover {
      background: rgba(200,132,26,0.06);
    }

    .sidebar-item.active {
      border-left-color: var(--amber);
      background: var(--sidebar-active-bg);
      font-weight: 600;
      color: var(--text-primary);
    }

    .sidebar-sep {
      border: none;
      border-top: 1px solid var(--border);
      margin: 12px 0;
    }

    .sidebar-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--amber);
      margin-right: 8px;
      flex-shrink: 0;
    }

    .sidebar-dot.ended {
      background: var(--text-muted);
      opacity: 0.5;
    }

    /* ── Main ── */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 32px 40px 60px 40px;
    }

    /* ── Column headers ── */
    .col-headers {
      display: grid;
      grid-template-columns: 5fr 2fr 4fr 2fr;
      gap: 0;
      padding: 0 0 8px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0;
    }

    .col-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ── Section heading ── */
    .section-heading {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text-muted);
      font-weight: 500;
      padding: 16px 0 8px 0;
    }

    /* ── Session rows ── */
    .session-row {
      display: grid;
      grid-template-columns: 5fr 2fr 4fr 2fr;
      gap: 0;
      align-items: center;
      min-height: 52px;
      border-bottom: 1px solid var(--border);
      padding: 10px 0;
    }

    .session-row:hover {
      background: rgba(26, 20, 16, 0.02);
      margin: 0 -8px;
      padding: 10px 8px;
      border-radius: 4px;
    }

    /* Name / project cell */
    .cell-name {
      padding-right: 16px;
    }

    .name-primary {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    .name-secondary {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .name-project-only {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.005em;
    }

    /* Status cell */
    .cell-status {}

    .status-active {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--amber-light);
      color: var(--amber);
      border: 1px solid var(--amber-border);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 100px;
      letter-spacing: 0.02em;
    }

    .status-active::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--amber);
      display: block;
    }

    .status-ended {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Path cell */
    .cell-path {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 16px;
    }

    /* Time cell */
    .cell-time {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
      text-align: right;
    }

    /* ── Amber divider ── */
    .amber-divider {
      width: 100%;
      height: 2px;
      background: var(--amber);
      margin: 4px 0;
      opacity: 0.7;
    }

    /* ── Tags ── */
    .tags {
      display: inline-flex;
      gap: 4px;
      margin-top: 3px;
    }

    .tag {
      font-size: 10px;
      color: var(--amber);
      background: var(--amber-light);
      border: 1px solid var(--amber-border);
      border-radius: 3px;
      padding: 1px 5px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    /* ── Banner ── */
    .banner {
      position: fixed;
      bottom: 12px;
      right: 16px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
      opacity: 0.7;
      letter-spacing: 0.04em;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <header class="header">
    <span class="header-wordmark">AngelEye</span>
    <div class="header-meta">
      <span class="pill-active" id="active-pill">— active</span>
      <span class="header-total" id="total-count">— total</span>
    </div>
  </header>

  <!-- Body -->
  <div class="body">

    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-group-label">Views</div>
      <div class="sidebar-item active">
        <span class="sidebar-dot"></span>
        Observer
      </div>
      <div class="sidebar-item">
        <span class="sidebar-dot ended"></span>
        Organiser
      </div>
      <hr class="sidebar-sep" />
      <div class="sidebar-group-label">Workspaces</div>
      <div class="sidebar-item">AngelEye Dev</div>
      <div class="sidebar-item">Tools</div>
      <div class="sidebar-item">Client Work</div>
      <div class="sidebar-item">Research</div>
      <hr class="sidebar-sep" />
      <div class="sidebar-group-label">Settings</div>
      <div class="sidebar-item">Backfill</div>
      <div class="sidebar-item">Config</div>
    </nav>

    <!-- Main content -->
    <main class="main" id="main-content">
      <div style="color:var(--text-muted); padding:40px;">Loading...</div>
    </main>
  </div><!-- /body -->
</div><!-- /shell -->

<div class="banner">Mochaccino — v5-brief — observer — API-driven</div>

<script>
  const API = '';

  function renderRow(s) {
    const nameCell = s.userAssignedName
      ? `<div class="name-primary">${esc(s.userAssignedName)}</div>
         <div class="name-secondary">${esc(s.projectSlug)} &middot; ${esc(s.sessionId)}</div>`
      : `<div class="name-project-only">${esc(s.projectSlug)}</div>
         <div class="name-secondary">${esc(s.sessionId)}</div>`;
    const tags = s.tags.length
      ? `<div class="tags">${s.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>`
      : '';
    const statusHtml = s.status === 'active'
      ? '<span class="status-active">active</span>'
      : '<span class="status-ended">ended</span>';
    return `<div class="session-row">
      <div class="cell-name">${nameCell}${tags}</div>
      <div class="cell-status">${statusHtml}</div>
      <div class="cell-path">${esc(s.path)}</div>
      <div class="cell-time">${esc(s.lastActiveRelative)}</div>
    </div>`;
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  async function load() {
    try {
      const res = await fetch(`${API}/api/mock-views/observer`);
      const json = await res.json();
      const d = json.data;

      document.getElementById('active-pill').textContent = `${d.activeCount} active`;
      document.getElementById('total-count').textContent = `${d.totalCount} total`;

      let html = `
        <div class="col-headers">
          <div class="col-label">Session / Project</div>
          <div class="col-label">Status</div>
          <div class="col-label">Path</div>
          <div class="col-label" style="text-align:right">Last active</div>
        </div>
        <div class="section-heading">Active now</div>`;

      html += d.activeSessions.map(renderRow).join('');
      html += '<div class="amber-divider"></div>';
      html += '<div class="section-heading">Ended</div>';
      html += d.endedSessions.map(renderRow).join('');

      document.getElementById('main-content').innerHTML = html;
    } catch (err) {
      document.getElementById('main-content').innerHTML =
        `<div style="color:red; padding:40px;">Failed to load: ${err.message}<br>Is the server running on port 5051?</div>`;
    }
  }

  load();
</script>
</body>
</html>
