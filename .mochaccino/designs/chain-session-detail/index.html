<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chain Session Detail — Mochaccino</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #e8e0d4; --surface: #ede7dc; --surface-mid: #ddd6cc;
    --card: #f5f1eb; --border: #d4cdc4; --border-raised: #ccc5bb;
    --primary: #c8841a; --fg: #2a2018; --muted: #7a6e5e; --muted-dim: #9e9484;
    --green: #3d8c40; --green-bg: #e8f2e8; --green-border: #b8d8b8;
    --red-muted: #b0816a;
    --sidebar-w: 220px;
  }
  body { background: var(--bg); color: var(--fg); font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.5; }

  /* ── Banner ──────────────────────────────────── */
  .banner { background: var(--border); color: var(--muted-dim); font-size: 11px; padding: 6px 16px; letter-spacing: 0.5px; text-align: center; }

  /* ── Layout ──────────────────────────────────── */
  .layout { display: flex; min-height: calc(100vh - 30px); }

  /* ── Sidebar ─────────────────────────────────── */
  .sidebar {
    width: var(--sidebar-w); min-width: var(--sidebar-w);
    background: var(--surface); border-right: 1px solid var(--border);
    padding: 24px 0; display: flex; flex-direction: column;
  }
  .sidebar-brand {
    font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px;
    color: var(--primary); padding: 0 20px 20px; border-bottom: 1px solid var(--border);
  }
  .sidebar-brand span { color: var(--fg); font-size: 14px; font-family: system-ui, sans-serif; letter-spacing: 0; display: block; margin-top: -2px; }
  .sidebar nav { padding: 16px 0; flex: 1; }
  .sidebar nav a {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 20px; font-size: 13px; font-weight: 500;
    color: var(--muted); text-decoration: none; transition: all 0.15s;
  }
  .sidebar nav a:hover { background: var(--surface-mid); color: var(--fg); }
  .sidebar nav a.active { background: var(--surface-mid); color: var(--primary); font-weight: 600; border-left: 3px solid var(--primary); padding-left: 17px; }
  .sidebar nav a .icon { width: 18px; text-align: center; font-size: 15px; }
  .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); font-size: 11px; color: var(--muted-dim); }

  /* ── Main ─────────────────────────────────────── */
  .main { flex: 1; padding: 24px 32px; max-width: 1060px; }

  /* ── Breadcrumb ──────────────────────────────── */
  .breadcrumb { font-size: 12px; color: var(--muted-dim); margin-bottom: 20px; }
  .breadcrumb a { color: var(--muted); text-decoration: none; }
  .breadcrumb a:hover { color: var(--primary); text-decoration: underline; }
  .breadcrumb .sep { margin: 0 6px; color: var(--border-raised); }

  /* ── Session Header ──────────────────────────── */
  .session-header {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 20px 24px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 16px;
  }
  .avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--green); color: #fff; font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .session-header-info { flex: 1; }
  .session-header-info h1 { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .status-label { font-size: 11px; font-weight: 600; color: var(--green); text-transform: uppercase; letter-spacing: 0.5px; }
  .session-meta { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 6px; font-size: 12px; color: var(--muted); }
  .session-meta .meta-item { display: flex; align-items: center; gap: 4px; }
  .session-meta .meta-label { font-weight: 600; color: var(--muted-dim); }
  .session-id { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11px; color: var(--muted-dim); background: var(--surface); padding: 2px 8px; border-radius: 4px; }

  /* ── Mini Pipeline ───────────────────────────── */
  .mini-pipeline {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 24px; margin-bottom: 20px;
    display: flex; align-items: center; gap: 0;
  }
  .mini-pipeline-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-right: 16px; white-space: nowrap; }
  .pipeline-steps { display: flex; align-items: center; flex: 1; }
  .pipeline-step {
    display: flex; align-items: center; gap: 0;
    flex: 1;
  }
  .step-node {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
    cursor: pointer; transition: all 0.15s; flex-shrink: 0;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--muted);
  }
  .step-node:hover { border-color: var(--primary); color: var(--primary); }
  .step-node.completed { background: var(--green-bg); border-color: var(--green-border); color: var(--green); }
  .step-node.active { background: var(--primary); border-color: var(--primary); color: #fff; box-shadow: 0 2px 8px rgba(200, 132, 26, 0.3); }
  .step-node.future { background: var(--surface-mid); border-color: var(--border); color: var(--muted-dim); }
  .step-connector { flex: 1; height: 2px; background: var(--border); min-width: 8px; }
  .step-connector.completed { background: var(--green-border); }
  .step-connector.active { background: var(--primary); }

  /* ── Panels Grid ─────────────────────────────── */
  .panels-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }

  /* ── Card ─────────────────────────────────────── */
  .panel {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 20px; overflow: hidden;
  }
  .panel-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }

  /* ── Workflow Context ─────────────────────────── */
  .context-grid { display: grid; grid-template-columns: auto 1fr; gap: 6px 12px; font-size: 13px; }
  .context-label { color: var(--muted-dim); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding-top: 1px; }
  .context-value { color: var(--fg); }
  .context-code { font-size: 10px; color: var(--muted-dim); font-family: 'SF Mono', monospace; margin-left: 4px; }

  /* ── Predicates ──────────────────────────────── */
  .predicate-list { display: flex; flex-direction: column; gap: 4px; }
  .predicate-row {
    display: flex; align-items: flex-start; gap: 8px; padding: 5px 8px; border-radius: 6px;
    font-size: 12px; transition: background 0.1s;
  }
  .predicate-row.fired { background: var(--green-bg); }
  .predicate-icon { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; margin-top: 1px; }
  .predicate-icon.true { background: var(--green); color: #fff; }
  .predicate-icon.false { background: var(--surface-mid); color: var(--muted-dim); }
  .predicate-name { color: var(--fg); font-weight: 500; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; }
  .predicate-row.fired .predicate-name { color: var(--green); }
  .predicate-note { color: var(--muted); font-size: 11px; font-style: italic; margin-top: 1px; }
  .predicate-summary { font-size: 11px; color: var(--muted); margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); font-weight: 600; }

  /* ── Classification ──────────────────────────── */
  .classification-list { display: flex; flex-direction: column; gap: 10px; }
  .class-row { display: flex; flex-direction: column; gap: 3px; }
  .class-label { font-size: 11px; color: var(--muted-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .class-value { display: flex; align-items: center; gap: 8px; }
  .pill {
    display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 12px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.3px;
    background: var(--surface-mid); color: var(--fg); border: 1px solid var(--border);
  }
  .pill.build { background: #e6d9c3; color: #8b5e14; border-color: #d4c4a8; }
  .pill.heavy { background: #e0cfc0; color: #6b5540; border-color: #d0bfae; }
  .pill.mixed { background: var(--surface); color: var(--muted); }
  .pill.slash { background: #d9e0d4; color: #4a6040; border-color: #c4d0bc; }
  .pill.orchestrated { background: #d4dce6; color: #3a5068; border-color: #bcc8d4; }
  .pill.launcher { background: #e2d6e8; color: #5a3e6a; border-color: #d0c0da; }

  /* Scale bar */
  .scale-bar-container { display: flex; align-items: center; gap: 8px; }
  .scale-bar { width: 80px; height: 6px; background: var(--surface-mid); border-radius: 3px; overflow: hidden; }
  .scale-bar-fill { height: 100%; border-radius: 3px; background: var(--primary); }

  /* Tool profile bar */
  .tool-profile { display: flex; height: 8px; border-radius: 4px; overflow: hidden; width: 100%; margin-top: 4px; }
  .tool-segment { height: 100%; }
  .tool-legend { display: flex; gap: 10px; margin-top: 6px; flex-wrap: wrap; }
  .tool-legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); }
  .tool-legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  /* ── Metrics ─────────────────────────────────── */
  .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .metric-item { display: flex; flex-direction: column; gap: 2px; }
  .metric-label { font-size: 11px; color: var(--muted-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
  .metric-value { font-size: 18px; font-weight: 700; color: var(--fg); }
  .metric-value.highlight { color: var(--primary); }
  .metric-sub { font-size: 11px; color: var(--muted); font-weight: 400; }

  /* ── Event Feed ──────────────────────────────── */
  .event-feed {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px 20px;
  }
  .event-feed-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); margin-bottom: 12px;
  }
  .event-list { display: flex; flex-direction: column; gap: 0; }
  .event-row {
    display: flex; align-items: center; gap: 12px; padding: 7px 0;
    border-bottom: 1px solid var(--border); font-size: 12px;
  }
  .event-row:last-child { border-bottom: none; }
  .event-time { font-family: 'SF Mono', monospace; font-size: 11px; color: var(--muted-dim); width: 40px; flex-shrink: 0; }
  .event-type {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    padding: 2px 8px; border-radius: 4px; min-width: 80px; text-align: center; flex-shrink: 0;
  }
  .event-type.edit { background: #e6d9c3; color: #8b5e14; }
  .event-type.bash { background: #d4dce6; color: #3a5068; }
  .event-type.read { background: #d9e0d4; color: #4a6040; }
  .event-type.agent { background: #e2d6e8; color: #5a3e6a; }
  .event-type.task { background: var(--surface-mid); color: var(--muted); }
  .event-detail { color: var(--fg); font-family: 'SF Mono', monospace; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .event-detail.quoted { font-family: system-ui, sans-serif; font-style: italic; color: var(--muted); }
</style>
</head>
<body>

<!-- Banner -->
<div class="banner">Mochaccino &mdash; chain-session-detail &mdash; API-driven</div>

<div class="layout">

  <!-- ── Sidebar ──────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-brand">ANGELEYE<span>ambient intelligence</span></div>
    <nav>
      <a href="#"><span class="icon">&#9678;</span> Observer</a>
      <a href="#"><span class="icon">&#9776;</span> Organiser</a>
      <a href="#" class="active"><span class="icon">&#9635;</span> Sprint Board</a>
      <a href="#"><span class="icon">&#9881;</span> Settings</a>
    </nav>
    <div class="sidebar-footer">AngelEye v0.4 &middot; Mochaccino</div>
  </aside>

  <!-- ── Main Content ─────────────────────────── -->
  <main class="main" id="main-content">
    <div style="color:var(--muted); padding:40px;">Loading session detail...</div>
  </main>
</div>

<script>
  const API = '';

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  // Tool color palette
  const TOOL_COLORS = [
    '#c8841a', '#5b8abf', '#8b6bb5', '#6aab6a', '#cc6666',
    '#e6a833', '#5599aa', '#aa7744',
  ];

  // Events to skip in the feed (noise)
  const SKIP_EVENTS = new Set(['pre_tool_use', 'post_tool_use', 'tool_failure', 'progress', 'cwd_changed']);

  // Event type → CSS class
  function eventTypeCls(type) {
    const map = { tool_use: 'edit', bash_command: 'bash', file_read: 'read',
      agent_spawn: 'agent', task_update: 'task', user_prompt: 'task', stop: 'read' };
    return map[type] || 'task';
  }
  function eventTypeLabel(type) {
    const map = { tool_use: 'Tool', bash_command: 'Bash', file_read: 'Read',
      agent_spawn: 'Agent', task_update: 'Task', user_prompt: 'User', stop: 'Response' };
    return map[type] || type;
  }

  // Scale mapping
  function scalePercent(scale) {
    const map = { trivial: 10, light: 30, moderate: 50, heavy: 75, epic: 95 };
    return map[scale] || 50;
  }

  // Pill CSS class
  function pillCls(val) {
    if (!val) return '';
    const v = val.toLowerCase();
    const map = { build: 'build', research: 'mixed', knowledge: 'slash',
      orientation: 'heavy', ops: 'orchestrated', test: 'launcher',
      heavy: 'heavy', epic: 'heavy', moderate: 'mixed', light: 'slash', trivial: 'slash',
      mixed: 'mixed', 'read-heavy': 'slash', 'edit-heavy': 'build', 'bash-heavy': 'orchestrated',
      'slash-command': 'slash', 'free-text': 'mixed', 'continuation': 'heavy',
      orchestrated: 'orchestrated', delegated: 'orchestrated', solo: 'mixed',
      skill_launcher: 'launcher', compaction_resume: 'heavy', fresh: 'slash',
    };
    return map[v] || '';
  }

  function renderBreadcrumb(d) {
    const project = esc(d.session.projectSlug);
    const name = d.session.userAssignedName ? esc(d.session.userAssignedName) : esc(d.session.sessionId);
    return `<a href="#">Observer</a><span class="sep">/</span>
      <a href="#">${project}</a><span class="sep">/</span>
      <strong style="color: var(--fg);">${name}</strong>`;
  }

  function renderSessionHeader(d) {
    const s = d.session;
    const wf = d.workflowContext;
    const initial = (wf.identity || s.userAssignedName || s.projectSlug || '?')[0].toUpperCase();
    const isActive = s.status === 'active';
    const statusDot = isActive ? '<span class="status-dot"></span>' : '';
    const statusLabel = isActive
      ? '<span class="status-label">Active</span>'
      : `<span class="status-label" style="color:var(--muted)">${esc(s.status)}</span>`;
    const title = s.userAssignedName || s.projectSlug;

    let metaItems = '';
    if (wf.identity) metaItems += `<div class="meta-item"><span class="meta-label">Agent:</span> ${esc(wf.identity)}</div>`;
    metaItems += `<div class="meta-item"><span class="meta-label">Started:</span> ${esc(s.startedAt)}</div>`;
    metaItems += `<div class="meta-item"><span class="meta-label">Project:</span> ${esc(s.projectSlug)}</div>`;
    metaItems += `<div class="meta-item"><span class="session-id">${esc(s.sessionId)}</span></div>`;

    return `<div class="avatar">${initial}</div>
      <div class="session-header-info">
        <h1>${esc(title)} ${statusDot} ${statusLabel}</h1>
        <div class="session-meta">${metaItems}</div>
      </div>`;
  }

  function renderMiniPipeline(d) {
    // If session belongs to affinity groups, show group chain steps
    const groups = d.affinityGroups || [];
    if (groups.length === 0) return '';

    const label = groups[0].label || 'Session';
    // We don't have full chain data here, so show a simple single-step indicator
    return `<div class="mini-pipeline">
      <div class="mini-pipeline-label">${esc(label)}</div>
      <div class="pipeline-steps">
        <div class="pipeline-step">
          <div class="step-node ${d.session.status === 'active' ? 'active' : 'completed'}">
            ${esc((d.workflowContext.role || '?').slice(0, 3).toUpperCase())}
          </div>
        </div>
      </div>
    </div>`;
  }

  function renderWorkflowContext(d) {
    const wf = d.workflowContext;
    const groups = d.affinityGroups || [];

    function row(label, value, code) {
      if (!value) return '';
      const codeHtml = code ? ` <span class="context-code">${esc(code)}</span>` : '';
      return `<span class="context-label">${esc(label)}</span>
        <span class="context-value">${esc(value)}${codeHtml}</span>`;
    }

    let html = row('Role', wf.role, 'C14');
    html += row('Identity', wf.identity, 'C15');
    html += row('Action', wf.action, 'C16');
    html += row('Trigger', wf.triggerCommand, 'E01');
    html += row('Arguments', wf.triggerArguments, 'E02');

    if (groups.length > 0) {
      html += `<span class="context-label">Affinity</span>
        <span class="context-value">${esc(groups[0].label)} <span class="context-code">${esc(groups[0].groupType)}</span></span>`;
    }

    if (!html) html = `<span class="context-label">Info</span><span class="context-value">No workflow context detected</span>`;

    return `<div class="panel">
      <div class="panel-title">Workflow Context</div>
      <div class="context-grid">${html}</div>
    </div>`;
  }

  function renderPredicates(d) {
    const preds = d.predicates || [];
    const fired = preds.filter(p => p.fired).length;

    const rows = preds.map(p => {
      const cls = p.fired ? 'predicate-row fired' : 'predicate-row';
      const icon = p.fired
        ? '<div class="predicate-icon true">&#10003;</div>'
        : '<div class="predicate-icon false">&mdash;</div>';
      return `<div class="${cls}">${icon}<div>
        <div class="predicate-name">${esc(p.code)} ${esc(p.name)}</div>
      </div></div>`;
    }).join('');

    return `<div class="panel">
      <div class="panel-title">Predicates Fired</div>
      <div class="predicate-list">${rows}</div>
      <div class="predicate-summary">${fired} of ${preds.length} predicates fired</div>
    </div>`;
  }

  function renderClassification(d) {
    const c = d.classification;
    const tp = d.toolProfile || [];

    let html = '';

    // Session Type
    if (c.sessionType) {
      html += `<div class="class-row">
        <div class="class-label">Session Type <span class="context-code">C01</span></div>
        <div class="class-value"><span class="pill ${pillCls(c.sessionType)}">${esc(c.sessionType.toUpperCase())}</span></div>
      </div>`;
    }

    // Session Scale
    if (c.sessionScale) {
      html += `<div class="class-row">
        <div class="class-label">Session Scale <span class="context-code">C02</span></div>
        <div class="class-value">
          <span class="pill ${pillCls(c.sessionScale)}">${esc(c.sessionScale)}</span>
          <div class="scale-bar-container">
            <div class="scale-bar"><div class="scale-bar-fill" style="width: ${scalePercent(c.sessionScale)}%;"></div></div>
          </div>
        </div>
      </div>`;
    }

    // Tool Profile
    if (c.toolPattern) {
      html += `<div class="class-row">
        <div class="class-label">Tool Profile <span class="context-code">C05</span></div>
        <div class="class-value"><span class="pill ${pillCls(c.toolPattern)}">${esc(c.toolPattern)}</span></div>
      </div>`;
    }

    // Tool profile bar
    if (tp.length > 0) {
      const segments = tp.map((t, i) =>
        `<div class="tool-segment" style="width: ${t.percent}%; background: ${TOOL_COLORS[i % TOOL_COLORS.length]};"></div>`
      ).join('');
      const legend = tp.map((t, i) =>
        `<div class="tool-legend-item"><div class="tool-legend-dot" style="background: ${TOOL_COLORS[i % TOOL_COLORS.length]};"></div>${esc(t.tool)} ${t.percent}%</div>`
      ).join('');
      html += `<div style="margin-top: -2px;">
        <div class="tool-profile">${segments}</div>
        <div class="tool-legend">${legend}</div>
      </div>`;
    }

    return `<div class="panel">
      <div class="panel-title">Classification</div>
      <div class="classification-list">${html || '<div style="color:var(--muted)">No classification data</div>'}</div>
    </div>`;
  }

  function renderMetrics(d) {
    const m = d.metrics;
    const ratio = m.autonomyRatio > 0
      ? `${m.autonomyRatio} <span class="metric-sub">tools/prompt</span>`
      : `— <span class="metric-sub">n/a</span>`;

    return `<div class="panel">
      <div class="panel-title">Session Metrics</div>
      <div class="metrics-grid">
        <div class="metric-item">
          <div class="metric-label">Total Events</div>
          <div class="metric-value">${m.totalEvents}</div>
        </div>
        <div class="metric-item">
          <div class="metric-label">Tool Calls</div>
          <div class="metric-value">${m.toolCalls}</div>
        </div>
        <div class="metric-item">
          <div class="metric-label">User Prompts</div>
          <div class="metric-value">${m.userPrompts}</div>
        </div>
        <div class="metric-item">
          <div class="metric-label">Autonomy Ratio</div>
          <div class="metric-value highlight">${ratio}</div>
        </div>
      </div>
    </div>`;
  }

  function renderEventFeed(d) {
    const events = (d.recentEvents || []).filter(ev => !SKIP_EVENTS.has(ev.eventType));
    if (events.length === 0) return '';

    const rows = events.map(ev => {
      const cls = eventTypeCls(ev.eventType);
      const label = eventTypeLabel(ev.eventType);
      const isQuoted = ev.eventType === 'agent_spawn' || ev.eventType === 'user_prompt' || ev.eventType === 'task_update';
      const detailCls = isQuoted ? 'event-detail quoted' : 'event-detail';
      const detail = isQuoted ? `"${esc(ev.detail)}"` : esc(ev.detail);
      return `<div class="event-row">
        <div class="event-time">${esc(ev.timestamp)}</div>
        <div class="event-type ${cls}">${esc(label)}</div>
        <div class="${detailCls}">${detail}</div>
      </div>`;
    }).join('');

    return `<div class="event-feed">
      <div class="event-feed-title">Recent Events (last ${events.length})</div>
      <div class="event-list">${rows}</div>
    </div>`;
  }

  function renderAll(d) {
    return `
      <div class="breadcrumb">${renderBreadcrumb(d)}</div>
      <div class="session-header">${renderSessionHeader(d)}</div>
      ${renderMiniPipeline(d)}
      <div class="panels-grid">
        ${renderWorkflowContext(d)}
        ${renderPredicates(d)}
        ${renderClassification(d)}
        ${renderMetrics(d)}
      </div>
      ${renderEventFeed(d)}`;
  }

  async function discoverSessionId() {
    // Use ?session=<id> if provided
    const params = new URLSearchParams(window.location.search);
    if (params.get('session')) return params.get('session');

    // Auto-discover: pick first classified session from named-rows
    const res = await fetch(`${API}/api/mock-views/named-rows`);
    const json = await res.json();
    const sessions = json.data.sessions || [];
    // Prefer one with a session type
    const classified = sessions.find(s => s.sessionType);
    return classified ? classified.fullSessionId : (sessions[0]?.fullSessionId || null);
  }

  async function load() {
    const main = document.getElementById('main-content');
    try {
      const sessionId = await discoverSessionId();
      if (!sessionId) {
        main.innerHTML = '<div style="color:var(--muted); padding:40px;">No sessions found in registry.</div>';
        return;
      }

      const res = await fetch(`${API}/api/mock-views/chain-session-detail/${sessionId}`);
      if (!res.ok) {
        main.innerHTML = `<div style="color:red; padding:40px;">Session not found (${res.status})</div>`;
        return;
      }
      const json = await res.json();
      main.innerHTML = renderAll(json.data);
    } catch (err) {
      main.innerHTML = `<div style="color:red; padding:40px;">Failed to load: ${err.message}</div>`;
    }
  }

  load();
</script>

</body>
</html>
