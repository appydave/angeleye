<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AngelEye — Sprint Board — Mochaccino</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #e8e0d4;
    --surface: #ede7dc;
    --surface-mid: #ddd6cc;
    --card: #f5f1eb;
    --border: #d4cdc4;
    --border-raised: #ccc5bb;
    --primary: #c8841a;
    --fg: #2a2018;
    --muted: #7a6e5e;
    --muted-dim: #9e9484;
  }

  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--fg);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Banner */
  .banner {
    background: var(--fg);
    color: var(--muted);
    font-size: 11px;
    text-align: center;
    padding: 3px 0;
    letter-spacing: 0.08em;
    flex-shrink: 0;
  }

  /* Layout */
  .app-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 224px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }

  .sidebar-brand {
    padding: 20px 16px 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-brand h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 0.18em;
    color: var(--primary);
    font-weight: 400;
  }

  .sidebar-brand .brand-sub {
    font-size: 10px;
    color: var(--muted-dim);
    letter-spacing: 0.06em;
    margin-top: 2px;
  }

  .sidebar-section {
    padding: 16px 0 8px;
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 16px 6px;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 16px;
    font-size: 13px;
    font-weight: 500;
    color: #4a3e30;
    cursor: pointer;
    transition: background 0.12s;
    border-left: 2px solid transparent;
  }

  .sidebar-item:hover {
    background: var(--surface-mid);
  }

  .sidebar-item.active {
    background: var(--surface);
    border-left: 2px solid var(--primary);
    color: var(--fg);
    font-weight: 600;
  }

  .sidebar-item .item-icon {
    font-size: 14px;
    opacity: 0.7;
    width: 18px;
    text-align: center;
  }

  .sidebar-divider {
    height: 1px;
    background: var(--border);
    margin: 8px 16px;
  }

  .sidebar-footer {
    margin-top: auto;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--muted-dim);
    letter-spacing: 0.04em;
  }

  /* Main area */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .main-header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    flex-shrink: 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .main-header-left h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 0.08em;
    color: var(--fg);
    font-weight: 400;
  }

  .main-header-left .subtitle {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .main-header-right {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-top: 4px;
  }

  .btn-correlate {
    font-size: 11px;
    font-weight: 600;
    color: var(--card);
    background: var(--fg);
    border: none;
    padding: 5px 14px;
    border-radius: 5px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.15s;
  }

  .btn-correlate:hover {
    background: #3d3224;
  }

  /* Epic header */
  .epic-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .epic-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  .epic-summary {
    font-size: 11px;
    color: var(--muted-dim);
    letter-spacing: 0.02em;
  }

  .epic-summary strong {
    color: var(--muted);
    font-weight: 600;
  }

  /* Board */
  .board {
    flex: 1;
    display: flex;
    gap: 12px;
    padding: 16px 20px;
    overflow-x: auto;
    overflow-y: hidden;
  }

  /* Column */
  .column {
    min-width: 195px;
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 260px;
  }

  .column-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 4px 10px;
  }

  .column-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    letter-spacing: 0.14em;
    color: var(--muted);
    font-weight: 400;
  }

  .column-codes {
    font-size: 9px;
    color: var(--muted-dim);
    letter-spacing: 0.04em;
  }

  .column-count {
    margin-left: auto;
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    background: var(--surface-mid);
    padding: 1px 7px;
    border-radius: 8px;
  }

  .column-cards {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow-y: auto;
    padding-right: 4px;
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .card:hover {
    border-color: var(--border-raised);
    box-shadow: 0 2px 8px rgba(42, 32, 24, 0.06);
  }

  .card-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .card-id {
    font-size: 11px;
    font-weight: 700;
    color: var(--fg);
    white-space: nowrap;
  }

  .card-title {
    font-size: 11px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  .card-mid {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .avatar {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }

  .avatar-blue { background: #4a7fb5; }
  .avatar-green { background: #4a9e6e; }
  .avatar-orange { background: #c87a2a; }
  .avatar-purple { background: #7a5eb5; }
  .avatar-pink { background: #b55e8a; }

  .action-code {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    background: var(--surface-mid);
    padding: 1px 6px;
    border-radius: 3px;
    letter-spacing: 0.06em;
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 600;
    margin-left: auto;
  }

  .status-active { color: #3a8a5c; }
  .status-waiting { color: #b5862a; }
  .status-blocked { color: #c44a3a; }
  .status-complete { color: #3a8a5c; }
  .status-backtracking { color: #b5862a; }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status-dot-active {
    background: #3a8a5c;
    animation: pulse 1.8s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(58, 138, 92, 0.4); }
    50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(58, 138, 92, 0); }
  }

  .status-icon {
    font-size: 11px;
    line-height: 1;
  }

  .duration {
    font-size: 10px;
    color: var(--muted-dim);
    white-space: nowrap;
  }

  .card-bottom {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .progress-bar {
    flex: 1;
    height: 3px;
    background: var(--surface-mid);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s;
  }

  .progress-fill-active { background: var(--primary); }
  .progress-fill-complete { background: #3a8a5c; }
  .progress-fill-blocked { background: #c44a3a; }

  .progress-label {
    font-size: 9px;
    color: var(--muted-dim);
    white-space: nowrap;
    font-weight: 600;
  }

  /* Blocked card accent */
  .card-blocked {
    border-left: 3px solid rgba(196, 74, 58, 0.35);
  }

  /* Active card accent */
  .card-active {
    border-left: 3px solid rgba(58, 138, 92, 0.3);
  }

  /* Complete cards — slightly muted */
  .card-complete {
    opacity: 0.82;
  }

  .card-complete:hover {
    opacity: 1;
  }

  /* Empty column placeholder */
  .column-empty {
    font-size: 11px;
    color: var(--muted-dim);
    text-align: center;
    padding: 24px 8px;
    font-style: italic;
  }

  /* Scrollbar */
  .column-cards::-webkit-scrollbar { width: 4px; }
  .column-cards::-webkit-scrollbar-track { background: transparent; }
  .column-cards::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- Banner -->
<div class="banner">Mochaccino &mdash; chain-sprint-board &mdash; 2026-03-27</div>

<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h1>ANGELEYE</h1>
      <div class="brand-sub">Ambient Intelligence</div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Views</div>
      <div class="sidebar-item">
        <span class="item-icon">&#9678;</span> Observer
      </div>
      <div class="sidebar-item">
        <span class="item-icon">&#9776;</span> Organiser
      </div>
      <div class="sidebar-item active">
        <span class="item-icon">&#9632;</span> Sprint Board
      </div>
    </div>

    <div class="sidebar-divider"></div>

    <div class="sidebar-section">
      <div class="sidebar-label">Manage</div>
      <div class="sidebar-item">
        <span class="item-icon">&#9881;</span> Settings
      </div>
    </div>

    <div class="sidebar-footer" id="sidebar-footer">
      AngelEye v0.4
    </div>
  </aside>

  <!-- Main -->
  <div class="main">

    <!-- Header -->
    <div class="main-header">
      <div class="main-header-left">
        <h2>SPRINT BOARD</h2>
        <div class="subtitle" id="board-subtitle">Loading...</div>
      </div>
      <div class="main-header-right">
        <button class="btn-correlate">Correlate</button>
      </div>
    </div>

    <!-- Epic header -->
    <div class="epic-header" id="epic-header">
      <span class="epic-label">Loading...</span>
    </div>

    <!-- Board -->
    <div class="board" id="board">
      <div style="color:var(--muted); padding:24px;">Loading board...</div>
    </div>
    <!-- /board -->

  </div>
  <!-- /main -->

</div>
<!-- /app-layout -->

<script>
  const API = '';

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  const COLUMNS = [
    { key: 'plan', title: 'PLAN', codes: 'WN, CS, VS' },
    { key: 'build', title: 'BUILD', codes: 'DS' },
    { key: 'review', title: 'REVIEW', codes: 'DR' },
    { key: 'test', title: 'TEST', codes: 'SAT' },
    { key: 'curate', title: 'CURATE', codes: 'CU' },
    { key: 'ship', title: 'SHIP', codes: '' },
  ];

  const STEP_TO_COLUMN = {
    planner: 'plan', writer: 'plan', spec_writer: 'plan',
    developer: 'build', builder: 'build',
    reviewer: 'review', design_reviewer: 'review',
    tester: 'test', qa: 'test',
    curator: 'curate', advisor: 'curate',
    shipper: 'ship', observer: 'ship',
  };

  // Map role names to BMAD action codes for display
  const ROLE_TO_CODE = {
    planner: 'WN', writer: 'CS', spec_writer: 'VS',
    developer: 'DS', builder: 'DS',
    reviewer: 'DR', design_reviewer: 'DR',
    tester: 'SAT', qa: 'SAT',
    curator: 'CU', advisor: 'CU',
    shipper: 'SHIP', observer: 'OBS',
  };

  const AVATAR_COLORS = ['avatar-blue', 'avatar-green', 'avatar-orange', 'avatar-purple', 'avatar-pink'];

  function statusBadgeHtml(status) {
    if (status === 'active') return '<div class="status-badge status-active"><span class="status-dot status-dot-active"></span><span>Active</span></div>';
    if (status === 'complete') return '<div class="status-badge status-complete"><span class="status-icon">&#10003;</span><span>Complete</span></div>';
    return '<div class="status-badge status-waiting"><span class="status-icon">&#128336;</span><span>Pending</span></div>';
  }

  function renderCard(story) {
    const cardCls = story.status === 'active' ? 'card card-active'
      : story.status === 'complete' ? 'card card-complete' : 'card';
    const progressPct = story.chainSteps.length > 0
      ? Math.round((story.sessionCount / Math.max(story.chainSteps.length, 1)) * 100) : 0;
    const fillCls = story.status === 'active' ? 'progress-fill-active'
      : story.status === 'complete' ? 'progress-fill-complete' : 'progress-fill-active';
    // Show last agent (most recent in chain), not first
    const lastAgent = story.agents[story.agents.length - 1] || '?';
    const agentInitial = lastAgent[0].toUpperCase();
    const avatarCls = AVATAR_COLORS[Math.abs(agentInitial.charCodeAt(0)) % AVATAR_COLORS.length];
    const lastStep = story.currentStep || '—';
    const actionCode = ROLE_TO_CODE[lastStep] || lastStep.slice(0, 4).toUpperCase();

    return `<div class="${cardCls}">
      <div class="card-top">
        <span class="card-id">${esc(String(story.storyId))}</span>
        <span class="card-title">${esc(story.title)}</span>
      </div>
      <div class="card-mid">
        <div class="avatar ${avatarCls}">${agentInitial}</div>
        <span class="action-code">${esc(actionCode)}</span>
        ${statusBadgeHtml(story.status)}
      </div>
      <div class="card-bottom">
        <div class="progress-bar">
          <div class="progress-fill ${fillCls}" style="width: ${Math.min(progressPct, 100)}%"></div>
        </div>
        <span class="progress-label">${story.sessionCount}/${story.chainSteps.length}</span>
      </div>
    </div>`;
  }

  async function load() {
    try {
      const res = await fetch(`${API}/api/mock-views/chain-sprint-board`);
      const json = await res.json();
      const d = json.data;

      document.getElementById('sidebar-footer').textContent = `AngelEye v0.4 · ${d.totalSessions} sessions`;
      document.getElementById('board-subtitle').textContent = `${d.epics.length} epics · ${d.totalSessions} sessions tracked`;

      // Show first epic in header, or all
      const allStories = d.epics.flatMap(e => e.stories);
      const activeCount = allStories.filter(s => s.status === 'active').length;
      const completeCount = allStories.filter(s => s.status === 'complete').length;
      document.getElementById('epic-header').innerHTML =
        `<span class="epic-label">${d.epics.map(e => esc(e.epicTitle)).join(' + ')}</span>
         <span class="epic-summary"><strong>${allStories.length}</strong> stories · <strong>${completeCount}</strong> complete · <strong>${activeCount}</strong> active</span>`;

      // Bucket stories into columns
      const buckets = {};
      COLUMNS.forEach(c => buckets[c.key] = []);
      for (const story of allStories) {
        const colKey = STEP_TO_COLUMN[story.currentStep] || 'plan';
        buckets[colKey].push(story);
      }

      // Render columns
      let boardHtml = '';
      for (const col of COLUMNS) {
        const cards = buckets[col.key];
        const cardsHtml = cards.length > 0
          ? cards.map(renderCard).join('')
          : `<div class="column-empty">No stories</div>`;
        boardHtml += `<div class="column">
          <div class="column-header">
            <span class="column-title">${col.title}</span>
            <span class="column-codes">${col.codes}</span>
            <span class="column-count">${cards.length}</span>
          </div>
          <div class="column-cards">${cardsHtml}</div>
        </div>`;
      }
      document.getElementById('board').innerHTML = boardHtml;
    } catch (err) {
      document.getElementById('board').innerHTML =
        `<div style="color:red; padding:24px;">Failed to load: ${err.message}</div>`;
    }
  }

  load();
</script>
</body>
</html>
